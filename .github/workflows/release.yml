# On a v* tag: build native + managed across all RIDs, pack per-RID
# runtime NuGets, pack the managed Exclr8Cef + Exclr8Cef.WebView NuGets,
# and publish to nuget.org.
#
# Required secrets:
#   NUGET_API_KEY  — push key for nuget.org

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (defaults to tag, e.g. v0.5.0-stage5 → 0.5.0-stage5)'
        required: false

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-runtime:
    name: Build runtime (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
            cef_platform: macosarm64
          - os: macos-13
            rid: osx-x64
            cef_platform: macosx64
          - os: windows-latest
            rid: win-x64
            cef_platform: windows64
          - os: ubuntu-22.04
            rid: linux-x64
            cef_platform: linux64
          - os: ubuntu-22.04-arm
            rid: linux-arm64
            cef_platform: linuxarm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup CMake / Ninja (macOS, Linux)
        if: runner.os != 'Windows'
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install cmake ninja
          else
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build build-essential libgtk-3-dev libnss3-dev
          fi

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Version: ${VERSION}"

      - name: Download CEF
        shell: bash
        run: ./scripts/download-cef.sh

      - name: Build native shim
        shell: bash
        run: |
          cmake -S native -B native/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build native/build --parallel

      - name: Stage native files
        shell: bash
        run: |
          mkdir -p artifacts/staging-${{ matrix.rid }}
          ./scripts/stage-native-files.sh ${{ matrix.rid }} artifacts/staging-${{ matrix.rid }}

      - name: Pack runtime NuGet
        shell: bash
        run: |
          dotnet pack managed/runtime/runtime.csproj \
            -c Release \
            -p:Exclr8CefRid=${{ matrix.rid }} \
            -p:Exclr8CefStagingDir="$(pwd)/artifacts/staging-${{ matrix.rid }}" \
            -p:Exclr8CefVersion=${{ steps.ver.outputs.version }} \
            -o artifacts/nupkgs

      - name: Upload runtime NuGet
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-runtime-${{ matrix.rid }}
          path: artifacts/nupkgs/runtime.${{ matrix.rid }}.Exclr8Cef.*.nupkg
          retention-days: 30

  build-managed:
    name: Build managed packages
    runs-on: ubuntu-22.04
    needs: build-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Generate runtime.json for Exclr8Cef
        run: ./scripts/generate-runtime-json.sh ${{ steps.ver.outputs.version }}

      - name: Pack managed NuGets
        run: |
          dotnet pack managed/Exclr8Cef -c Release \
            -p:Exclr8CefVersion=${{ steps.ver.outputs.version }} \
            -o artifacts/nupkgs
          dotnet pack managed/Exclr8Cef.WebView -c Release \
            -p:Exclr8CefVersion=${{ steps.ver.outputs.version }} \
            -o artifacts/nupkgs

      - name: Upload managed NuGets
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-managed
          path: artifacts/nupkgs/*.nupkg
          retention-days: 30

  publish:
    name: Publish to nuget.org
    runs-on: ubuntu-22.04
    needs: [build-runtime, build-managed]
    environment: nuget-publish
    if: github.event_name == 'push'   # tag-driven only; manual dispatch stops at packaging
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download all NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nupkg-*
          merge-multiple: true

      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for pkg in artifacts/*.nupkg; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
